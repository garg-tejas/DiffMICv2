scheduler:
  type: DDIM
  num_train_timesteps: 1000
  num_test_timesteps: 10
  beta_start: 0.0001
  beta_end: 0.02
  beta_schedule: linear
  eta: 0

# NOTE: The diffusion model architecture is defined in model.py::ConditionalModel,
# not via a config block. The DDIM scheduler parameters above are the only
# configuration read from this file.
